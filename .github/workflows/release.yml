name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile

      - name: Sync version from git tag to package.json
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Resolve npm dist-tag + prerelease flag
        id: dist_tag
        run: |
          # 含 prerelease 后缀（v1.2.3-canary.0 / -beta.x / -rc.x）发到对应 dist-tag，
          # 不覆盖 latest；纯净 vX.Y.Z 仍走默认 latest。
          VERSION="${GITHUB_REF_NAME#v}"
          if   [[ "$VERSION" == *"-canary"* ]]; then NPM_TAG=canary;  PRERELEASE=true
          elif [[ "$VERSION" == *"-beta"*   ]]; then NPM_TAG=beta;    PRERELEASE=true
          elif [[ "$VERSION" == *"-rc"*     ]]; then NPM_TAG=rc;      PRERELEASE=true
          elif [[ "$VERSION" == *"-"*       ]]; then NPM_TAG=next;    PRERELEASE=true
          else                                       NPM_TAG=latest;  PRERELEASE=false
          fi
          echo "tag=$NPM_TAG"           >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION → npm dist-tag=$NPM_TAG, prerelease=$PRERELEASE"

      - name: Guard against downgrading npm latest
        # 防止把比 npm 当前 latest 还小的版本号发到 latest dist-tag（曾发生
        # `git tag | tail` 拿到字典序末尾 v2.9.x 被当成最新版的事故，
        # CI 直接把 npm latest 从 2.27.4 覆盖到 2.9.x，导致所有
        # `npm i botmux` 用户被回退）。只在 dist-tag=latest 时校验；
        # canary/beta/rc/next 走旁路 dist-tag 不影响 latest。
        if: steps.dist_tag.outputs.tag == 'latest'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_LATEST=$(npm view botmux@latest version 2>/dev/null || echo "0.0.0")
          echo "npm latest currently: $CURRENT_LATEST"
          echo "this tag             : $VERSION"
          # semver compare via Node's built-in semver in npm
          if ! node -e "
            const a='$VERSION', b='$CURRENT_LATEST';
            const parse = s => s.split('.').map(Number);
            const [a1,a2,a3] = parse(a), [b1,b2,b3] = parse(b);
            const cmp = a1!==b1 ? a1-b1 : a2!==b2 ? a2-b2 : a3-b3;
            if (cmp <= 0) { console.error('REFUSING to publish ' + a + ' as latest (current latest is ' + b + ', would downgrade users)'); process.exit(1); }
            console.log('OK: ' + a + ' > ' + b);
          "; then
            exit 1
          fi

      - run: pnpm build

      - name: Publish to npm
        run: npm publish --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

      - name: Generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # actions/checkout 默认把 tag 存成轻量指针，需重新 fetch 才能拿到 annotated tag object
          git fetch origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" --force
          # 上一个 tag: stable 只跟 stable 比 (词法排序会把 canary 排到 stable 前面,
          # 不过滤的话 v2.24.4 的 compare 会指向 v2.24.4-canary.X 而不是 v2.24.3)
          if [[ "$GITHUB_REF_NAME" == *"-"* ]]; then
            PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$GITHUB_REF_NAME" | head -1)
          else
            PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$GITHUB_REF_NAME" | grep -v -e '-' | head -1)
          fi
          TAG_MSG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")

          # cliff.toml 渲染'本次合并'（PR 标题/链接由 GITHUB_TOKEN 拉 GitHub 元数据）。
          # 用显式区间 PREV_TAG..本 tag，别用 --current：--current 在 HEAD 落在 tag 上时
          # 会把范围撑到好几个历史 release，导致'本次合并'重复堆叠多段。PREV_TAG 上面已算好。
          # git-cliff 会翻全仓 commit 做 PR 关联，偶发触发 GitHub 二级限流 → 401 panic。
          # 故包成非致命：失败时降级为纯 commit 列表，保证 Release 一定能创建，不再被 changelog 卡死。
          if ! CLIFF=$(npx --yes git-cliff "${PREV_TAG}..${GITHUB_REF_NAME}" 2>cliff.err); then
            echo "::warning::git-cliff failed, falling back to plain commit list"
            cat cliff.err || true
            CLIFF=$(printf -- '---\n\n## 本次合并\n'; git log --no-merges --reverse --pretty='- %s' "${PREV_TAG}..${GITHUB_REF_NAME}")
          fi

          # '感谢贡献者'独立用 gh 按区间内每个 commit 反查所属 PR 作者：有界调用（约等于区间 commit 数），
          # 不翻全仓、不会触发上面那种限流；去重并排除仓库 owner。不再依赖 git-cliff 的
          # github.contributors —— 那个只收录'首次贡献者'，会漏掉之前贡献过的人。
          THANKS=""
          declare -A SEEN
          for sha in $(git rev-list --no-merges --reverse "${PREV_TAG}..${GITHUB_REF_NAME}"); do
            for login in $(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" --jq '.[].user.login' 2>/dev/null); do
              if [ "$login" != "${GITHUB_REPOSITORY_OWNER}" ] && [ -z "${SEEN[$login]:-}" ]; then
                SEEN[$login]=1
                THANKS="$THANKS @$login"
              fi
            done
          done
          THANKS="${THANKS# }"

          {
            echo 'body<<CHANGELOG_EOF'
            [ -n "$TAG_MSG" ] && echo "$TAG_MSG"
            echo "$CLIFF"
            if [ -n "$THANKS" ]; then
              echo ""
              echo "## 感谢贡献者"
              echo "$THANKS"
            fi
            echo ""
            echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ steps.dist_tag.outputs.prerelease == 'true' }}
