# git-cliff 配置 — 在手写中文 changelog 下面自动追加'本次合并'一段。
# 触发: CI 在 push tag (v*) 时调用; 也可本地预览: GITHUB_TOKEN=$(gh auth token) git-cliff --unreleased
#
# 注意:'感谢贡献者'段不在这里渲染。git-cliff 的 github.contributors 只收录'首次贡献者',
# 会漏掉之前贡献过的人; 故改由 release.yml 用 gh 按区间内 PR 作者去重生成(见该 workflow)。

[changelog]
header = ""
body = """
{%- if commits | length > 0 %}
---

## 本次合并
{% for commit in commits -%}
- {% if commit.remote.pr_title -%}{{ commit.remote.pr_title }}{%- else -%}{{ commit.message | split(pat="\n") | first | trim }}{%- endif %}\
{%- if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }})){%- endif %}\
{%- if commit.remote.username %} — @{{ commit.remote.username }}{%- endif %}
{% endfor -%}
{%- endif -%}
"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
filter_commits = false
# 跳过 merge commit：用'Merge pull request'方式合 PR 时,git 历史里 PR 标题会同时挂在
# 分支 commit 和 merge commit 上,不过滤会导致一个 PR 在'本次合并'里出现两次。
# 兼容自定义 merge message:'Merge branch …'、'Merge: …'、'Merge fix/… '等。
commit_parsers = [
  { message = "^Merge[ :]", skip = true },
]
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

[remote.github]
owner = "deepcoldy"
repo = "botmux"
